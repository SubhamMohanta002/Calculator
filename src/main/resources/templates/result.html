<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Result</title>
<style>
 body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f0f4f8;
    color: #333;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
  }
  .container {
    background: white;
    padding: 30px 40px;
    max-width: 420px;
    width: 100%;
    border-radius: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
  }
  h1 {
    color: #3f51b5;
    text-align: center;
  }
  .result-box {
    background: #e8eaf6;
    border-left: 6px solid #3f51b5;
    padding: 15px 20px;
    margin-bottom: 30px;
    border-radius: 6px;
  }
  .result-box p {
    margin: 8px 0;
    font-weight: 600;
    font-size: 1.1rem;
  }
  form label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
    margin-top: 12px;
    color: #444;
  }
  input[type=number] {
    width: 100%;
    padding: 10px 12px;
    border: 1.8px solid #cfd8dc;
    border-radius: 6px;
    font-size: 1rem;
    transition: border-color 0.3s;
  }
  input[type=number]:focus {
    border-color: #3f51b5;
    outline: none;
  }
  .buttons {
    margin-top: 28px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  button {
    flex: 1 1 calc(50% - 12px);
    background-color: #3f51b5;
    color: white;
    border: none;
    padding: 14px 0;
    font-weight: 700;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    transition: background-color 0.3s ease;
    margin-top: 10px;
    margin-right: 2px;
  }
  button:hover {
    background-color: #2c387e;
  }
  @media (max-width: 400px) {
    .buttons button {
      flex: 1 1 100%;
    }
  }
  </style>
</head>
<body>
<h1>Calculation Result</h1>
<div>
<p><strong>Result:</strong> <span th:text="${result}"></span></p>
<p><strong>Operation:</strong> <span th:text="${operation}"></span></p>
<form action="/calculate" method="post">
<label for="num1">Enter Number 1:</label>
<input type="number" id="num1" name="num1" value="${num1}" required>

<label for="num2">Enter Number 2:</label>
<input type="number" id="num2" name="num2" value="${num2}" required>

<div>
  <button type="submit" name="operation" value="add">Add</button>
  <button type="submit" name="operation" value="sub">Subtract</button>
  <button type="submit" name="operation" value="mul">Multiply</button>
  <button type="submit" name="operation" value="div">Divide</button>
  </div>
</form>
</div>

</body>
</html>
