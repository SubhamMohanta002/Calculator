<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculator</title>
<style>
     body{
  padding: 25px;
}
.title {
	color: #5C6AC4;
}
/* styles.css */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f0f4f8;
  margin: 0;
  padding: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: #333;
}

h1 {
  color: #4a90e2;
  margin-bottom: 30px;
  font-weight: 700;
}

.calculator {
  background: #fff;
  padding: 30px 40px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(74, 144, 226, 0.2);
  width: 320px;
}

form label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  color: #555;
}

form input[type="number"] {
  width: 100%;
  padding: 10px 12px;
  margin-bottom: 20px;
  border: 2px solid #d1d9e6;
  border-radius: 8px;
  font-size: 16px;
  transition: border-color 0.3s ease;
}

form input[type="number"]:focus {
  border-color: #4a90e2;
  outline: none;
}

form div {
  display: flex;
  justify-content: space-between;
}

form button {
  flex: 1;
  background-color: #4a90e2;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 12px 0;
  margin: 0 5px;
  font-weight: 600;
  cursor: pointer;
  transition: background-color 0.3s ease;
  user-select: none;
}

form button:first-child {
  margin-left: 0;
}

form button:last-child {
  margin-right: 0;
}

form button:hover {
  background-color: #357ABD;
}

form button:active {
  background-color: #2a5d9f;
}
</style>
</head>
<body>
  <h1>Simple Calculator</h1>
  <div class="calculator"> 
  <form action="/calculate" method="post">
  <label for="num1">Enter Number 1:</label>
  <input type="number" id="num1" name="num1" required>
  
  <label for="num2">Enter Number 2:</label>
  <input type="number" id="num2" name="num2" required>
  
  <div>
  <button type="submit" name="operation" value="add">Add</button>
  <button type="submit" name="operation" value="sub">Subtract</button>
  <button type="submit" name="operation" value="mul">Multiply</button>
  <button type="submit" name="operation" value="div">Divide</button>
  </div>
  </form>
  </div>
</body>
</html>
